<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
            margin: 10px;
            display: inline-block;
        }
        .container {
        background-color: bisque;
        height: 700px;
        width: 900px;
        margin-top: 10px;
    }
    </style>

</head>
<body>
    <!-- user se hm puch rahe the kitne shape chaiye circle keh ab hm next task-2 meh user se puchege koan sa shape chaiye -->
    <!-- esh task meh for loop , dom and event used hua h -->
    <input type="number" name="quantity" id="quantity" placeholder="Enter How many shape you want">
    <button id="generate">Generate</button>
    <div class="container"></div>

    <script>
        const generate = document.querySelector("#generate");

        generate.addEventListener("click", () => {
            const quantity = document.querySelector("#quantity").value;

            const container = document.querySelector(".container");
            

            for(let i = 0; i < quantity; i++) {
                let shape = document.createElement("div");
                shape.classList.add("circle");
                
                // shape.style.width = "100px";
                // shape.style.height = "100px";
                container.appendChild(shape);
            }
        });
    </script>
    
</body>
</html>
